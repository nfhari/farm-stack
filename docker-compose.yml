version: '3.9'

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: hariprasadbandaru/farm-backend:v1
    env_file:
    - ./backend/.env
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb

  frontend:
    image: hariprasadbandaru/farm-frontend:v1
    container_name: react_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

  nextapp:
    image: hariprasadbandaru/farm-nextapp:v1
    container_name: nextjs_app
    ports:
      - "3000:3000"
    volumes:
      - ./nextapp:/app
      - /app/node_modules

volumes:
  mongo_data: